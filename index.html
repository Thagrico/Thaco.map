<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>THACO AGRI</title>
<link href="manifest.json" rel="manifest"/>
<link href="icon-192.png" rel="icon"/>
<meta content="#0c6b37" name="theme-color"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@700;800&amp;display=swap" rel="stylesheet"/>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
}

.container{
    width:100%;
    max-width:1200px;
    margin:0 auto;
    padding:30px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

/* ================= Banner ================= */

.banner{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin-bottom:35px;
}

.banner img{
    width:720px;
    max-width:100%;
    display:block;
    margin:auto;
}

.vn-slogan{
    margin-top:16px;
    font-size:56px;
    font-family:'Be Vietnam Pro',sans-serif;
    font-weight:800;
    color:#2e7d32;
    letter-spacing:0.8px;
    line-height:1.15;
}
/* ================= Logo ================= */

.logos{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:60px;
    margin:30px 0 40px;
}

.logos img{
    width:150px;
    transition:0.3s;
}

.logos img:hover{
    transform:scale(1.08);
}

.logo-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    color:inherit;
}

.logo-name{
    margin-top:10px;
    font-size:26px;
    font-weight:700;
    color:#2e7d32;
    letter-spacing:1px;
}

/* ================= Map ================= */

.map{
    width:100%;
    text-align:center;
    margin-bottom:40px;
}

.map img{
    width:360px;
    max-width:100%;
    display:block;
    margin:auto;
}

/* ================= Bottom ================= */

.bottom{
    width:100%;
    text-align:center;
}

.bottom img{
    width:820px;
    max-width:100%;
    display:block;
    margin:auto;
}

/* ================= Mobile ================= */

@media(max-width:768px){

.banner img{
    width:100%;
}

.vn-slogan{
    font-size:40px;
}
.logos{
    gap:20px;
}

.logos img{
    width:95px;
}

.map img{
    width:270px;
}

.bottom img{
    width:100%;
}

}

</style>
</head>
<body>
<div class="container">
<!-- Enhance -->
<div class="banner">
<img alt="THACO AGRI" src="Enhance.png"/>
<div class="vn-slogan">
            Nâng tầm Nông nghiệp Việt
        </div>
</div>
<!-- 3 Logo -->
<div class="logos"><a class="logo-item" href="https://sn-black.vercel.app/" target="_blank"><img alt="SN" src="icon-192.png"/><div class="logo-name">SN</div></a>
<a class="logo-item" href="https://km-flame-three.vercel.app/" target="_blank"><img alt="KM" src="icon-192.png"/><div class="logo-name">KM</div></a>
<a class="logo-item" href="https://laos-weld.vercel.app/" target="_blank"><img alt="ATP" src="icon-192.png"/><div class="logo-name">ATP</div></a>
</div>
<!-- Bản đồ -->
<div class="visitor-box" style="text-align:center;margin:25px 0;"><div style="font-size:28px;font-weight:bold;color:#f00;margin-bottom:8px;">Lượt truy cập</div><a href="https://www.hitwebcounter.com/webcounter.php" rel="noopener" target="_blank"><img alt="Visitors" src="https://hitwebcounter.com/counter/counter.php?page=1&amp;style=0006&amp;nbdigits=5&amp;type=page&amp;initCount=0"/></a><div style="font-size:16px;color:#666;margin-top:4px;">Visitors</div></div><div class="map">
<img alt="Indochine" src="Indochine.png"/>
</div>
<!-- Nuôi trồng -->
<div class="bottom">
<img alt="Nuôi trồng" src="nuoi-trong.png"/>
</div>
</div>
</body>
</html>
