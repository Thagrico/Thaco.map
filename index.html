<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THACO AGRI</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#0c6b37">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
}

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
    text-align:center;
    padding:30px;
}

.banner{
    margin-bottom:35px;
}

.banner img{
    width:720px;
    max-width:100%;
    display:block;
    margin:auto;
}

.vn-slogan{
    margin-top:8px;
    font-size:22px;
    font-weight:600;
    color:#2e7d32;
}

.logos{
    display:flex;
    justify-content:center;
    gap:50px;
    flex-wrap:wrap;
    margin:40px 0;
}

.logos img{
    width:170px;
    transition:.3s;
}

.logos img:hover{
    transform:scale(1.08);
}

.map{
    margin:30px 0;
}

.map img{
    width:450px;
    max-width:100%;
}

.bottom{
    margin-top:35px;
}

.bottom img{
    width:800px;
    max-width:100%;
}

@media(max-width:768px){

.logos{
    gap:25px;
}

.logos img{
    width:120px;
}

.map img{
    width:300px;
}

.vn-slogan{
    font-size:18px;
}

}
</style>

</head>

<body>

<div class="container">

    <div class="banner">
        <img src="./Enhance.png" alt="THACO AGRI">
        <div class="vn-slogan">Nâng tầm nông nghiệp Việt</div>
    </div>

    <div class="logos">
        <img src="./icon-192.png" alt="Logo">
        <img src="./icon-192.png" alt="Logo">
        <img src="./icon-192.png" alt="Logo">
    </div>

    <div class="map">
        <img src="./Indochine.png" alt="Bản đồ">
    </div>

    <div class="bottom">
        <img src="./nuoi-trong.png" alt="Nuôi trồng">
    </div>

</div>

</body>
</html>
