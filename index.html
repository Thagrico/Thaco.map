<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRUNG TÂM NÔNG NGHIỆP VIỆT</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192(5).png">
<meta name="theme-color" content="#0c6b37">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
}

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
    text-align:center;
    padding:30px;
}

h1{
    color:#0a6a37;
    font-size:48px;
    font-weight:bold;
    margin-bottom:30px;
}

.banner{
    margin-bottom:35px;
}

.banner img{
    width:720px;
    max-width:100%;
    height:auto;
}

.logos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
    margin:40px 0;
    flex-wrap:wrap;
}

.logos img{
    width:170px;
    height:auto;
    transition:0.3s;
}

.logos img:hover{
    transform:scale(1.08);
}

.map{
    margin:40px 0;
}

.map img{
    width:420px;
    max-width:100%;
    height:auto;
}

.bottom{
    margin-top:40px;
}

.bottom img{
    width:850px;
    max-width:100%;
    height:auto;
}

@media(max-width:768px){

    h1{
        font-size:32px;
    }

    .logos{
        gap:20px;
    }

    .logos img{
        width:120px;
    }

    .map img{
        width:280px;
    }

    .bottom img{
        width:100%;
    }

}

</style>

</head>

<body>

<div class="container">

<h1>TRUNG TÂM NÔNG NGHIỆP VIỆT</h1>

<div class="banner">
    <img src="Enhance(2).png" alt="THACO AGRI">
</div>

<div class="logos">

    <img src="icon-192(5).png" alt="Logo">

    <img src="icon-192(5).png" alt="Logo">

    <img src="icon-192(5).png" alt="Logo">

</div>

<div class="map">
    <img src="Indochine(1).png" alt="Bản đồ Đông Dương">
</div>

<div class="bottom">
    <img src="nuoi-trong.png" alt="Nuôi trồng">
</div>

</div>

</body>
</html>
