<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trung tâm Nông nghiệp Việt</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#0c6b37">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
}

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
    text-align:center;
    padding:30px;
}

h1{
    color:#0a6a37;
    font-size:48px;
    font-weight:bold;
    margin-bottom:25px;
}

.banner{
    margin-bottom:35px;
}

.banner img{
    width:720px;
    max-width:100%;
    height:auto;
}

.logos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:60px;
    margin:40px 0;
    flex-wrap:wrap;
}

.logos img{
    width:170px;
    height:auto;
    transition:.3s;
    cursor:pointer;
}

.logos img:hover{
    transform:scale(1.08);
}

.map{
    margin:30px 0;
}

.map img{
    width:450px;
    max-width:100%;
}

.bottom{
    margin-top:35px;
}

.bottom img{
    width:800px;
    max-width:100%;
}

@media(max-width:768px){

h1{
    font-size:32px;
}

.logos{
    gap:25px;
}

.logos img{
    width:120px;
}

.map img{
    width:300px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>TRUNG TÂM NÔNG NGHIỆP VIỆT</h1>

<div class="banner">
    <img src="Enhance.png" alt="THACO AGRI">
</div>

<div class="logos">
    <img src="icon-192.png" alt="Logo 1">
    <img src="icon-192.png" alt="Logo 2">
    <img src="icon-192.png" alt="Logo 3">
</div>

<div class="map">
    <img src="Indochine.png" alt="Bản đồ">
</div>

<div class="bottom">
    <img src="nuoi-trong.png" alt="Nuôi trồng">
</div>

</div>

</body>
</html>
